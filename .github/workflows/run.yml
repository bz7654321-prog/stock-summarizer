name: 주식 유튜브 요약 실행

on:
  workflow_dispatch:

  schedule:
    - cron: "0 23 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      _API_KEY: ${{ secrets._API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      LOOKBACK_HOURS: "48"
      MAX_VIDEOS_PER_CHANNEL: "10"
      GEMINI_MODEL: "gemini-2.5-flash"

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 파이썬 버전 확인
        run: |
          python --version
          pip --version

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y google-generativeai || true
          pip install -U google-genai requests youtube-transcript-api

      - name: Secrets 확인
        run: |
          python - <<'PY'
          import os

          required = [
              "YOUTUBE_API_KEY",
              "TELEGRAM_TOKEN",
              "TELEGRAM_CHAT_ID",
          ]

          gemini_keys = [
              "GEMINI_API_KEY",
              "_API_KEY",
              "GOOGLE_API_KEY",
          ]

          missing = []

          for key in required:
              if not os.environ.get(key):
                  missing.append(key)

          if not any(os.environ.get(key) for key in gemini_keys):
              missing.append("GEMINI_API_KEY 또는 _API_KEY 또는 GOOGLE_API_KEY")

          if missing:
              print("❌ 누락된 Secrets:")
              for item in missing:
                  print("-", item)
              raise SystemExit(1)

          print("✅ 필수 Secrets 확인 완료")
          PY

      - name: 주식 유튜브 요약 실행
        run: |
          python main.py
